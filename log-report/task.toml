artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires parsing Apache-style request lines and accurately aggregating request, client, and path counts into a strict JSON schema."
solution_explanation = "Read each non-empty log entry, count total requests and distinct client IPs, count request paths, and serialize the required summary object to /app/report.json."
verification_explanation = "Four pytest checks validate the JSON artifact and its exact schema, total request count, distinct client count, and most frequent request path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
